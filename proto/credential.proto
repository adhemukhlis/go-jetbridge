syntax = "proto3";
package credential;
option go_package = "github.com/adhemukhlis/go-jetbridge/gen/proto/credential";

import "google/protobuf/empty.proto";
import "buf/validate/validate.proto";

// Credential Service
service CredentialService {
  rpc GetCredential(GetCredentialRequest) returns (CredentialResponse);
  rpc GetAllCredential(google.protobuf.Empty) returns (CredentialListResponse);
  rpc CreateCredential(CreateCredentialRequest) returns (CredentialMinimumResponse);
  rpc UpdateCredential(UpdateCredentialRequest) returns (CredentialMinimumResponse);
  rpc DeleteCredential(DeleteCredentialRequest) returns (CredentialMinimumResponse);
}

// Requests

message GetCredentialRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message CreateCredentialRequest {
  string userId                      = 1 [(buf.validate.field).string.min_len = 1];
  string password                    = 2 [(buf.validate.field).string.min_len = 1];
  optional string suspendedAt        = 3 [(buf.validate.field).string.min_len = 1];
  optional string suspendReason      = 4 [(buf.validate.field).string.min_len = 1];
  optional bool isNeedPasswordChange = 5;
}

message UpdateCredentialRequest {
  string id                          = 1 [(buf.validate.field).string.min_len = 1];
  string userId                      = 2 [(buf.validate.field).string.min_len = 1];
  string password                    = 3 [(buf.validate.field).string.min_len = 1];
  optional string suspendedAt        = 4 [(buf.validate.field).string.min_len = 1];
  optional string suspendReason      = 5 [(buf.validate.field).string.min_len = 1];
  optional bool isNeedPasswordChange = 6;
}

message DeleteCredentialRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// Responses

message CredentialResponse {
  string id                 = 1;
  string userId             = 2;
  bool isNeedPasswordChange = 3;
}

message CredentialMinimumResponse {
  string id = 1;
}

message CredentialListResponse {
  repeated CredentialResponse credentials = 1;
}