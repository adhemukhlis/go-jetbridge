syntax = "proto3";
package user;
option go_package = "go-jetbridge/gen/proto/user";

import "google/protobuf/empty.proto";
import "buf/validate/validate.proto";
import "role.proto";

// User Service
service UserService {
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc GetAllUser(google.protobuf.Empty) returns (UserListResponse);
  rpc CreateUser(CreateUserRequest) returns (UserMinimumResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UserMinimumResponse);
  rpc DeleteUser(DeleteUserRequest) returns (UserMinimumResponse);
}

// Requests

message GetUserRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message CreateUserRequest {
  string name     = 1 [(buf.validate.field).string.min_len = 3];
  string username = 2 [(buf.validate.field).string.min_len = 3];
  string email    = 3 [(buf.validate.field).string.email = true];
}

message UpdateUserRequest {
  string id                = 1 [(buf.validate.field).string.min_len = 1];
  optional string name     = 2 [(buf.validate.field).string.min_len = 3];
  optional string username = 3 [(buf.validate.field).string.min_len = 3];
  optional string email    = 4 [(buf.validate.field).string.email = true];
}

message DeleteUserRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// Responses

message UserResponse {
  string id                        = 1;
  string name                      = 2;
  string username                  = 3;
  string email                     = 4;
  repeated role.RoleResponse roles = 5;
}

message UserMinimumResponse {
  string id = 1;
}

message UserListResponse {
  repeated UserResponse users = 1;
}