syntax = "proto3";
package role;
option go_package = "go-jetbridge/gen/proto/role";

import "google/protobuf/empty.proto";
import "buf/validate/validate.proto";

// Role Service
service RoleService {
  rpc GetRole(GetRoleRequest) returns (RoleResponse);
  rpc GetAllRole(google.protobuf.Empty) returns (RoleListResponse);
  rpc CreateRole(CreateRoleRequest) returns (RoleMinimumResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (RoleMinimumResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (RoleMinimumResponse);
}

// Requests

message GetRoleRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message CreateRoleRequest {
  string key  = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string.min_len = 1];
}

message UpdateRoleRequest {
  string id            = 1 [(buf.validate.field).string.min_len = 1];
  optional string key  = 2 [(buf.validate.field).string.min_len = 1];
  optional string name = 3 [(buf.validate.field).string.min_len = 1];
}

message DeleteRoleRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// Responses

message RoleResponse {
  string id   = 1;
  string key  = 2;
  string name = 3;
}

message RoleMinimumResponse {
  string id = 1;
}

message RoleListResponse {
  repeated RoleResponse roles = 1;
}

