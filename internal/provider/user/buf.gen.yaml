version: v2
managed:
  enabled: true
  override:
    - file_option: go_package
      path: user.proto
      value: go-jetbridge/internal/provider/user/gen/user
plugins:
  - local: protoc-gen-go
    out: gen
    opt: 
      - module=go-jetbridge/internal/provider/user/gen
      - Mbuf/validate/validate.proto=buf.build/gen/go/bufbuild/protovalidate/protocolbuffers/go/buf/validate
  - local: protoc-gen-go-grpc
    out: gen
    opt: 
      - module=go-jetbridge/internal/provider/user/gen
